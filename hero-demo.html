<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morocco With You - Hero</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Marcellus&display=swap');

    :root {
      --z-blue: #4f8ca8;
      --z-green: #5f8f73;
      --z-beige: #e9ddc7;
      --z-terracotta: #b7745a;
      --ink: #16333f;
      --white: #ffffff;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: #f8f5ee;
      color: var(--ink);
      min-height: 100vh;
    }

    .hero {
      position: relative;
      min-height: 100dvh;
      overflow: hidden;
      isolation: isolate;
      display: grid;
      place-items: center;
      padding: clamp(1rem, 3vw, 2.4rem);
    }

    .zellige-layer {
      position: absolute;
      inset: -14%;
      z-index: -3;
      transform: scale(1.07);
      transform-origin: center;
      background:
        linear-gradient(30deg, transparent 47%, rgba(255, 255, 255, 0.2) 50%, transparent 53%),
        linear-gradient(-30deg, transparent 47%, rgba(255, 255, 255, 0.17) 50%, transparent 53%),
        linear-gradient(90deg, rgba(233, 221, 199, 0.82), rgba(95, 143, 115, 0.75), rgba(79, 140, 168, 0.8), rgba(183, 116, 90, 0.6));
      background-size: 130px 130px, 130px 130px, 100% 100%;
      background-position: 0 0, 65px 65px, center;
      filter: saturate(95%);
      animation: zelligeDrift 45s linear infinite, softZoom 20s ease-in-out infinite alternate;
      transition: transform 0.35s ease-out;
      will-change: transform, background-position;
    }

    .zellige-grain {
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: 0.18;
      background-image: radial-gradient(rgba(255, 255, 255, 0.9) 0.45px, transparent 0.55px);
      background-size: 2.2px 2.2px;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(180deg, rgba(14, 39, 48, 0.2) 0%, rgba(14, 39, 48, 0.56) 58%, rgba(14, 39, 48, 0.72) 100%),
        linear-gradient(120deg, rgba(233, 221, 199, 0.22), rgba(95, 143, 115, 0.17) 42%, rgba(79, 140, 168, 0.22));
    }

    .hero-inner {
      width: min(1100px, 100%);
      display: grid;
      justify-items: center;
      gap: clamp(1.4rem, 3vw, 2.5rem);
      text-align: center;
    }

    .hero-title {
      max-width: 900px;
      color: var(--white);
      font-family: 'Marcellus', serif;
      font-size: clamp(2rem, 5.1vw, 4.4rem);
      line-height: 1.12;
      letter-spacing: 0.01em;
      text-wrap: balance;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
      animation: rise 0.9s ease-out both;
    }

    .search-card {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: 0 18px 55px rgba(13, 38, 46, 0.2);
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr auto;
      align-items: center;
      gap: 0;
      padding: 0.4rem;
      animation: rise 0.9s ease-out 0.15s both;
    }

    .field {
      display: grid;
      gap: 0.24rem;
      text-align: left;
      padding: 0.9rem 1rem;
      border-radius: 16px;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    .field:not(:last-of-type) {
      border-right: 1px solid rgba(22, 51, 63, 0.1);
    }

    .field:hover {
      background: rgba(233, 221, 199, 0.26);
      transform: translateY(-1px);
    }

    .field label {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(22, 51, 63, 0.72);
    }

    .field input {
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: 0.96rem;
      font-weight: 600;
      width: 100%;
    }

    .field input::placeholder {
      color: rgba(22, 51, 63, 0.54);
      font-weight: 500;
    }

    .search-btn {
      border: 0;
      border-radius: 16px;
      margin: 0.2rem;
      padding: 1rem 1.3rem;
      font-size: 0.93rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      color: var(--white);
      background: linear-gradient(135deg, #2e6f89, #375f49 55%, #a8664d);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.3s ease, filter 0.2s ease;
      box-shadow: 0 10px 24px rgba(38, 88, 108, 0.34);
    }

    .search-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.04);
      box-shadow: 0 14px 26px rgba(22, 51, 63, 0.28);
    }

    .search-btn:active {
      transform: translateY(0);
    }

    @keyframes zelligeDrift {
      0% {
        background-position: 0 0, 65px 65px, center;
      }
      100% {
        background-position: 220px 160px, 285px 225px, center;
      }
    }

    @keyframes softZoom {
      from {
        transform: scale(1.07);
      }
      to {
        transform: scale(1.11);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 860px) {
      .hero {
        min-height: 760px;
      }

      .search-card {
        grid-template-columns: 1fr;
        padding: 0.55rem;
        gap: 0.35rem;
        border-radius: 22px;
      }

      .field {
        border-right: 0;
        border-bottom: 1px solid rgba(22, 51, 63, 0.09);
        padding: 0.8rem 0.9rem;
      }

      .field:last-of-type {
        border-bottom: 0;
      }

      .search-btn {
        width: 100%;
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <section class="hero" id="hero">
    <div class="zellige-layer" id="zelligeLayer" aria-hidden="true"></div>
    <div class="zellige-grain" aria-hidden="true"></div>

    <div class="hero-inner">
      <h1 class="hero-title">Transformez votre voyage au Maroc, en une expérience unique</h1>

      <form class="search-card" aria-label="Recherche de voyage">
        <div class="field">
          <label for="location">Location</label>
          <input id="location" type="text" placeholder="Marrakech, Fes, Essaouira" />
        </div>

        <div class="field">
          <label for="date">Date</label>
          <input id="date" type="date" />
        </div>

        <div class="field">
          <label for="departure">Departure</label>
          <input id="departure" type="text" placeholder="Paris, Casablanca" />
        </div>

        <button class="search-btn" type="submit">Search</button>
      </form>
    </div>
  </section>

  <script>
    const hero = document.getElementById('hero');
    const layer = document.getElementById('zelligeLayer');

    hero.addEventListener('mousemove', (event) => {
      const bounds = hero.getBoundingClientRect();
      const x = (event.clientX - bounds.left) / bounds.width - 0.5;
      const y = (event.clientY - bounds.top) / bounds.height - 0.5;
      layer.style.transform = `scale(1.1) translate(${x * 16}px, ${y * 10}px)`;
    });

    hero.addEventListener('mouseleave', () => {
      layer.style.transform = 'scale(1.1) translate(0, 0)';
    });
  </script>
</body>
</html>
